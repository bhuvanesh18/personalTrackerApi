version: '3.8'

services:
  personal-tracker-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-tracker-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=personalTrackerAPI
      - SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

